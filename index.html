<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cestas com Alma - Menu</title>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #5D3C28;
      --accent-color: #D4AF37;
      --bg-soft: rgba(255, 255, 255, 0.85);
    }

    body {
      background-image: linear-gradient(rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.6)), url('fundo1.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      font-family: 'Montserrat', sans-serif;
      color: var(--primary-color);
    }

    .header-section {
      padding: 60px 0 40px;
      text-align: center;
    }

    .main-title {
      font-family: 'Pacifico', cursive;
      font-size: 4rem;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
    }

    .subtitle {
      font-size: 1.2rem;
      font-weight: 400;
      letter-spacing: 1px;
    }

    /* Category Cards */
    .category-card {
      border: none;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      height: 250px;
      margin-bottom: 30px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      cursor: pointer;
      text-decoration: none;
      display: block;
    }

    .category-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.2);
    }

    .category-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }

    .category-card:hover .category-img {
      transform: scale(1.1);
    }

    .category-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(to top, rgba(93, 60, 40, 0.8), rgba(0,0,0,0.1));
      display: flex;
      align-items: flex-end;
      padding: 25px;
    }

    .category-name {
      color: white;
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      margin: 0;
    }

    /* Contact Section */
    .contact-section {
      background: var(--bg-soft);
      border-radius: 30px;
      padding: 40px;
      margin: 40px 0 80px;
      border: 2px dashed var(--accent-color);
    }

    .btn-whatsapp {
      background-color: #25D366;
      color: white;
      border-radius: 50px;
      padding: 15px 30px;
      font-weight: 700;
      border: none;
      transition: all 0.3s;
    }

    .btn-whatsapp:hover {
      background-color: #128C7E;
      transform: scale(1.05);
      color: white;
    }

    @media (max-width: 768px) {
      .main-title { font-size: 3rem; }
      .category-card { height: 200px; }
    }
  </style>
</head>
<body>

<div class="container">
  <header class="header-section">
    <h1 class="main-title">Cestas com Alma</h1>
    <p class="subtitle text-uppercase">Presentes que tocam o coração</p>
  </header>

  <div class="row">
    <!-- Café da Manhã -->
    <div class="col-md-4 col-sm-6">
      <a href="gallery.html?category=cafe_da_manha" class="category-card">
        <img src="Cafe_da_Manha/Café da manhã (1).jpeg" alt="Café da Manhã" class="category-img">
        <div class="category-overlay">
          <h3 class="category-name">Café da Manhã</h3>
        </div>
      </a>
    </div>

    <!-- Chocolate -->
    <div class="col-md-4 col-sm-6">
      <a href="gallery.html?category=chocolate" class="category-card">
        <img src="c2.jpeg" alt="Chocolate" class="category-img">
        <div class="category-overlay">
          <h3 class="category-name">Chocolates</h3>
        </div>
      </a>
    </div>

    <!-- Dia das Mães -->
    <div class="col-md-4 col-sm-6">
      <a href="gallery.html?category=dia_das_maes" class="category-card">
        <img src="c3.jpeg" alt="Dia das Mães" class="category-img">
        <div class="category-overlay">
          <h3 class="category-name">Dia das Mães</h3>
        </div>
      </a>
    </div>

    <!-- Dia dos Namorados -->
    <div class="col-md-4 col-sm-6">
      <a href="gallery.html?category=dia_dos_namorados" class="category-card">
        <img src="c4.jpeg" alt="Dia dos Namorados" class="category-img">
        <div class="category-overlay">
          <h3 class="category-name">Namorados</h3>
        </div>
      </a>
    </div>

    <!-- Aniversário -->
    <div class="col-md-4 col-sm-6">
      <a href="gallery.html?category=aniversario" class="category-card">
        <img src="c5.jpeg" alt="Aniversário" class="category-img">
        <div class="category-overlay">
          <h3 class="category-name">Aniversário</h3>
        </div>
      </a>
    </div>

    <!-- Queijo e Vinho -->
    <div class="col-md-4 col-sm-6">
      <a href="gallery.html?category=queijo_e_vinho" class="category-card">
        <img src="c6.jpeg" alt="Queijo e Vinho" class="category-img">
        <div class="category-overlay">
          <h3 class="category-name">Queijo e Vinho</h3>
        </div>
      </a>
    </div>

    <!-- Cervejas -->
    <div class="col-md-4 col-sm-6">
      <a href="gallery.html?category=cervejas" class="category-card">
        <img src="Cerveja/cerveja (1).jpeg" alt="Cervejas" class="category-img">
        <div class="category-overlay">
          <h3 class="category-name">Cervejas</h3>
        </div>
      </a>
    </div>
  </div>

  <div class="contact-section text-center">
    <h2 class="mb-4" style="font-family: 'Playfair Display', serif;">Dúvidas ou Personalização?</h2>
    <p class="mb-4">Se você não encontrou exatamente o que procura ou quer montar algo exclusivo, fale conosco!</p>
    <div class="col-lg-6 mx-auto">
      <textarea id="whatsappMessage" class="form-control mb-3" rows="3" placeholder="Olá! Gostaria de saber mais sobre as cestas..."></textarea>
      <button class="btn btn-whatsapp w-100" onclick="sendWhatsAppMessage()">
        Enviar Mensagem via WhatsApp
      </button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function sendWhatsAppMessage() {
    const phoneNumber = "5517997146108";
    const messageText = document.getElementById('whatsappMessage').value || "Olá! Vim pelo site e gostaria de tirar algumas dúvidas.";
    const message = encodeURIComponent(messageText);
    const whatsappUrl = `https://api.whatsapp.com/send?phone=${phoneNumber}&text=${message}`;
    window.open(whatsappUrl, '_blank');
  }
</script>
</body>
</html>
